database: postgresql://postgres:WByENIxESPwoaWlycEEtRkNuOfYqrNhh@postgres-uapc.railway.internal:5432/railway
crypto_db_pickle_key: randomhexstring
crypto_database: default

database_opts:
  min_size: 1
  max_size: 10

plugin_directories:
  upload: /data/plugins
  load:
    - /data/plugins
  trash: /data/trash

plugin_databases:
  postgres: postgresql://postgres:WByENIxESPwoaWlycEEtRkNuOfYqrNhh@postgres-uapc.railway.internal:5432/railway
  postgres_max_conns_per_plugin: 3
  postgres_opts: {}

server:
  hostname: 0.0.0.0
  port: 8080
  public_url: https://matrix-maubot-production.up.railway.app
  ui_base_path: /_matrix/maubot
  plugin_base_path: /_matrix/maubot/plugin/
  override_resource_path: /opt/maubot/frontend
  unshared_secret: supersecretstring

homeservers:
  matrix.org:
    url: https://synapse-production-ea3f.up.railway.app
    secret:

admins:
  root: ''
  peng: mysecurepassword
api_features:
  login: true
  plugin: true
  plugin_upload: true
  instance: true
  instance_database: true
  client: true
  client_proxy: true
  client_auth: true
  dev_open: true
  log: true

logging:
  version: 1
  formatters:
    simple:
      format: "[%(asctime)s] [%(levelname)s@%(name)s] %(message)s"
  handlers:
    console:
      class: logging.StreamHandler
      formatter: simple
  root:
    level: INFO
    handlers: [console]

oidc:
  issuer: https://mas-service-production-9288.up.railway.app
  client_id: maubot-client
  client_secret: railway-secret
