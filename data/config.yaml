database: ${MAUBOT_DB_URL}
crypto_db_pickle_key: ${MAUBOT_PICKLE_KEY}
crypto_database: default

database_opts:
  min_size: 1
  max_size: 10

plugin_directories:
  upload: /data/plugins
  load:
    - /data/plugins
  trash: /data/trash

plugin_databases:
  sqlite: /data/dbs
  postgres:
  postgres_max_conns_per_plugin: 3
  postgres_opts: {}

server:
  hostname: 0.0.0.0
  port: ${MAUBOT_PORT}
  public_url: https://example.com
  ui_base_path: /_matrix/maubot
  plugin_base_path: /_matrix/maubot/plugin/
  override_resource_path: /opt/maubot/frontend
  unshared_secret: ${MAUBOT_ACCESS_TOKEN}

homeservers:
  matrix.org:
    url: ${MAUBOT_MATRIX_HOMESERVER}
    secret:

admins:
  root: ''

api_features:
  login: true
  plugin: true
  plugin_upload: true
  instance: true
  instance_database: true
  client: true
  client_proxy: true
  client_auth: true
  dev_open: true
  log: true

logging:
  version: 1
  formatters:
    simple:
      format: "[%(asctime)s] [%(levelname)s@%(name)s] %(message)s"
  handlers:
    console:
      class: logging.StreamHandler
      formatter: simple
  root:
    level: ${MAUBOT_LOG_LEVEL}
    handlers: [console]

oidc:
  issuer: ${MAS_ISSUER}
  client_id: ${MAS_CLIENT_ID}
  client_secret: ${MAS_CLIENT_SECRET}
